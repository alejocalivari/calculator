<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
  <main class="page-shell">
    <div class="calculator-layout">
      <section class="calculator" aria-label="Calculator interface">
        <div class="calculator__glow" aria-hidden="true"></div>

        <header class="calculator__topbar">
          <p class="calculator__label">Aleclv Calculator</p>
          <div class="calculator__actions">
            <button class="theme-toggle" type="button" aria-label="Toggle color theme" aria-pressed="true">
              <span class="theme-toggle__track" aria-hidden="true">
                <span class="theme-toggle__thumb"></span>
              </span>
              <span class="theme-toggle__text">Dark</span>
            </button>

            <div class="calculator__status" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </header>

        <section class="display" aria-label="Calculator display">
          <p class="display__memory">READY</p>
          <p class="display__expression" aria-live="polite">0</p>
          <h1 class="display__value" aria-live="polite">0</h1>
        </section>

        <section class="keypad" aria-label="Calculator keypad">
          <button class="key key--soft" type="button">C</button>
          <button class="key key--soft" type="button">+/-</button>
          <button class="key key--soft" type="button">%</button>
          <button class="key key--accent" type="button" data-value="/">&divide;</button>

          <button class="key" type="button">7</button>
          <button class="key" type="button">8</button>
          <button class="key" type="button">9</button>
          <button class="key key--accent" type="button" data-value="*">&times;</button>

          <button class="key" type="button">4</button>
          <button class="key" type="button">5</button>
          <button class="key" type="button">6</button>
          <button class="key key--accent" type="button" data-value="-">-</button>

          <button class="key" type="button">1</button>
          <button class="key" type="button">2</button>
          <button class="key" type="button">3</button>
          <button class="key key--accent" type="button" data-value="+">+</button>

          <button class="key key--wide" type="button">0</button>
          <button class="key" type="button">.</button>
          <button class="key key--accent key--equals" type="button">=</button>
        </section>
      </section>

      <aside class="history-panel" aria-label="Calculation history">
        <header class="history-panel__header">
          <div>
            <p class="history-panel__eyebrow">Saved locally</p>
            <h2 class="history-panel__title">History</h2>
          </div>
          <button class="history-panel__clear" type="button">Clear</button>
        </header>

        <p class="history-panel__empty">No calculations yet.</p>
        <ul class="history-list" aria-live="polite"></ul>
      </aside>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
